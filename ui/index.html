<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Deep Research · AgentField</title>
<style>
  :root{
    --bg:#0e1117; --panel:#161b22; --panel2:#1c2230; --border:#2a3140;
    --txt:#e6edf3; --muted:#8b949e; --accent:#5b9dff; --accent2:#7ee787;
    --warn:#f0883e; --danger:#f85149; --ok:#3fb950;
  }
  *{box-sizing:border-box}
  body{margin:0;font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
       background:var(--bg);color:var(--txt)}
  header{padding:16px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
  header h1{font-size:16px;margin:0;font-weight:600}
  header .cp{font-size:12px;color:var(--muted);margin-left:auto}
  .wrap{display:grid;grid-template-columns:380px 1fr;gap:0;height:calc(100vh - 57px)}
  .left{border-right:1px solid var(--border);overflow-y:auto;padding:18px}
  .right{overflow-y:auto;padding:22px 28px;background:#0b0e14}
  .field{margin-bottom:14px}
  .field label{display:block;font-weight:600;margin-bottom:4px;font-size:13px}
  .field .help{color:var(--muted);font-size:11.5px;margin-top:3px}
  textarea,input,select{width:100%;background:var(--panel2);color:var(--txt);border:1px solid var(--border);
    border-radius:7px;padding:8px 10px;font:inherit;font-size:13px}
  textarea{min-height:120px;resize:vertical;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12.5px}
  input[type=range]{padding:0}
  .rangeRow{display:flex;align-items:center;gap:10px}
  .rangeRow output{min-width:20px;text-align:center;font-weight:700;color:var(--accent)}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .btn{background:var(--accent);color:#04101f;border:none;border-radius:7px;padding:10px 14px;font-weight:700;
    cursor:pointer;width:100%;font-size:14px}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .btn.sec{background:var(--panel2);color:var(--txt);border:1px solid var(--border)}
  .adv summary{cursor:pointer;color:var(--muted);font-size:12px;margin:6px 0 12px;user-select:none}
  .runs{margin-top:18px;border-top:1px solid var(--border);padding-top:12px}
  .runs h3{font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin:0 0 8px}
  .run{padding:9px 10px;border:1px solid var(--border);border-radius:7px;margin-bottom:7px;cursor:pointer;background:var(--panel)}
  .run:hover{border-color:var(--accent)}
  .run.active{border-color:var(--accent);background:var(--panel2)}
  .run .q{font-size:12.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px}
  .run .meta{font-size:11px;color:var(--muted);display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .pill{font-size:10px;font-weight:700;padding:1px 7px;border-radius:10px;text-transform:uppercase}
  .pill.running{background:#1f2937;color:var(--accent)}
  .pill.succeeded,.pill.success,.pill.completed{background:#0f2e1a;color:var(--ok)}
  .pill.failed,.pill.error,.pill.cancelled,.pill.canceled{background:#3a1417;color:var(--danger)}
  .tag{font-size:10px;background:var(--panel2);border:1px solid var(--border);border-radius:4px;padding:0 5px;color:var(--muted)}
  .empty{color:var(--muted);text-align:center;margin-top:80px}
  .report{max-width:860px}
  .report h1{font-size:24px;border-bottom:1px solid var(--border);padding-bottom:10px}
  .report h2{font-size:19px;margin-top:28px;color:var(--accent2)}
  .report h3{font-size:15px;color:var(--txt)}
  .report table{border-collapse:collapse;width:100%;margin:14px 0;font-size:12.5px}
  .report th,.report td{border:1px solid var(--border);padding:7px 9px;text-align:left;vertical-align:top}
  .report th{background:var(--panel2)}
  .report a{color:var(--accent)}
  .report blockquote{border-left:3px solid var(--accent);margin:12px 0;padding:4px 14px;color:var(--muted)}
  .report code{background:var(--panel2);padding:1px 5px;border-radius:4px;font-size:12px}
  .status-line{color:var(--muted);font-size:13px;margin-bottom:16px;display:flex;gap:14px;align-items:center;flex-wrap:wrap}
  .spinner{width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;
    display:inline-block;animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .toast{position:fixed;bottom:18px;right:18px;background:var(--panel2);border:1px solid var(--border);
    padding:10px 14px;border-radius:8px;font-size:13px;max-width:360px}
  .cfgbar{font-size:11px;color:var(--muted);margin-bottom:14px;display:flex;gap:6px;flex-wrap:wrap}
</style>
</head>
<body>
<header>
  <h1>🔬 Deep Research</h1>
  <span class="cp" id="cp"></span>
</header>
<div class="wrap">
  <div class="left">
    <form id="form"></form>
    <button class="btn" id="submit" onclick="runSearch()">Run research →</button>
    <div class="runs">
      <h3>Runs <span id="runcount" style="color:var(--muted)"></span></h3>
      <div id="runlist"></div>
    </div>
  </div>
  <div class="right" id="viewer">
    <div class="empty">Configure parameters on the left and run a search,<br>or pick a past run to view its report.</div>
  </div>
</div>
<div id="toast"></div>

<script>
let SCHEMA=null, ACTIVE=null, POLL=null;

function h(html){const t=document.createElement('template');t.innerHTML=html.trim();return t.content.firstChild;}
function toast(msg,ms=2600){const t=document.getElementById('toast');t.innerHTML=`<div class="toast">${msg}</div>`;setTimeout(()=>t.innerHTML='',ms);}

// Session guard: when SuperTokens rejects an expired/absent session (401),
// send the user to the login page instead of surfacing the raw JSON error.
// Returns a never-resolving promise on 401 so callers stop cleanly while the
// browser navigates away.
async function api(url,opts){
  const res=await fetch(url,opts);
  if(res.status===401){location.href='/login';return new Promise(()=>{});}
  return res;
}

async function loadSchema(){
  const d=await (await api('/defaults')).json();
  SCHEMA=d;
  const form=document.getElementById('form');
  const advanced=['num_parallel_streams','tension_lens','mode','evidence_style','model'];
  const main=[], adv=[];
  d.fields.forEach(f=>{(advanced.includes(f.key)?adv:main).push(fieldHtml(f));});
  form.appendChild(h(`<div>${main.join('')}</div>`));
  form.appendChild(h(`<details class="adv"><summary>⚙ Advanced parameters</summary>${adv.join('')}</details>`));
  // wire range outputs
  form.querySelectorAll('input[type=range]').forEach(r=>{
    const o=form.querySelector(`output[for="${r.id}"]`);
    r.oninput=()=>o.value=r.value;
  });
}

function fieldHtml(f){
  const id='f_'+f.key;
  let ctl='';
  if(f.type==='textarea') ctl=`<textarea id="${id}" placeholder="${f.placeholder||''}">${f.default||''}</textarea>`;
  else if(f.type==='select') ctl=`<select id="${id}">${f.options.map(o=>`<option value="${o.value}" ${o.value===f.default?'selected':''}>${o.label}</option>`).join('')}</select>`;
  else if(f.type==='range') ctl=`<div class="rangeRow"><input type="range" id="${id}" min="${f.min}" max="${f.max}" step="${f.step||1}" value="${f.default}"><output for="${id}">${f.default}</output></div>`;
  else if(f.type==='number') ctl=`<input type="number" id="${id}" min="${f.min??''}" max="${f.max??''}" step="${f.step||1}" value="${f.default}">`;
  else ctl=`<input type="text" id="${id}" value="${f.default||''}" placeholder="${f.placeholder||''}">`;
  return `<div class="field"><label for="${id}">${f.label}${f.required?' *':''}</label>${ctl}<div class="help">${f.help||''}</div></div>`;
}

function collect(){
  const p={};
  SCHEMA.fields.forEach(f=>{const el=document.getElementById('f_'+f.key);p[f.key]=el?el.value:f.default;});
  return p;
}

async function runSearch(){
  const p=collect();
  if(!p.query.trim()){toast('⚠ Query is required');return;}
  const btn=document.getElementById('submit');btn.disabled=true;btn.textContent='Launching…';
  try{
    const res=await (await api('/api/run',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(p)})).json();
    if(res.error){toast('❌ '+res.error);}
    else{toast('🚀 Launched '+res.run_id);ACTIVE=res.run_id;await refreshRuns();openRun(res.run_id);}
  }catch(e){toast('❌ '+e);}
  btn.disabled=false;btn.textContent='Run research →';
}

async function refreshRuns(){
  const d=await (await api('/api/runs')).json();
  document.getElementById('cp').textContent='control plane: '+d.control_plane;
  const list=document.getElementById('runlist');
  document.getElementById('runcount').textContent=d.runs.length?`(${d.runs.length})`:'';
  if(!d.runs.length){list.innerHTML='<div class="help">No runs yet.</div>';return;}
  list.innerHTML='';
  d.runs.forEach(r=>{
    const p=r.params||{};
    const st=(r.status||'running').toLowerCase();
    const el=h(`<div class="run ${r.run_id===ACTIVE?'active':''}" data-run="${r.run_id}">
      <div class="q">${(p.query||'(no query)').slice(0,90)}</div>
      <div class="meta">
        <span class="pill ${st}">${st}</span>
        <span class="tag">${p.analysis_depth||''}</span>
        <span class="tag">focus ${p.research_focus} · scope ${p.research_scope}</span>
        <span class="tag">${p.source_strictness}</span>
        <span>${(r.created_at||'').slice(5,16).replace('T',' ')}</span>
      </div></div>`);
    el.onclick=()=>openRun(r.run_id);
    list.appendChild(el);
  });
}

async function openRun(runId){
  ACTIVE=runId;
  document.querySelectorAll('.run').forEach(e=>e.classList.toggle('active',e.dataset.run===runId));
  const v=document.getElementById('viewer');
  v.innerHTML='<div class="status-line"><span class="spinner"></span> Loading run…</div>';
  await poll(runId,true);
  if(POLL)clearInterval(POLL);
  POLL=setInterval(()=>poll(runId,false),8000);
}

async function poll(runId,first){
  if(ACTIVE!==runId)return;
  let d;
  try{d=await (await api('/api/result?run='+encodeURIComponent(runId))).json();}catch(e){return;}
  if(ACTIVE!==runId)return;
  const v=document.getElementById('viewer');
  const st=(d.status||'unknown').toLowerCase();
  const running=['running','pending','queued','registered','submitted',''].includes(st);
  const cfg=d.params?`<div class="cfgbar">
      <span class="tag">${d.params.analysis_depth}</span>
      <span class="tag">focus ${d.params.research_focus}</span>
      <span class="tag">scope ${d.params.research_scope}</span>
      <span class="tag">loops ${d.params.max_research_loops}</span>
      <span class="tag">streams ${d.params.num_parallel_streams}</span>
      <span class="tag">${d.params.source_strictness}</span>
      <span class="tag">${d.params.tension_lens}</span>
    </div>`:'';
  if(d.html){
    if(POLL&&!running){clearInterval(POLL);POLL=null;}
    const mins=d.duration_ms?(d.duration_ms/60000).toFixed(1)+' min':'';
    v.innerHTML=`<div class="status-line">
        <span class="pill ${st}">${st}</span>
        <span>${d.section_count} sections</span>
        <span>${d.source_count} sources</span>
        ${mins?`<span>${mins}</span>`:''}
        <span style="margin-left:auto"><a href="#" onclick="dl('${runId}');return false;" style="color:var(--accent)">⭳ markdown</a></span>
      </div>${cfg}<div class="report">${d.html}</div>`;
    window._md=d.markdown;
  }else if(running){
    v.innerHTML=`<div class="status-line"><span class="spinner"></span><span class="pill running">running</span>
      <span>Research in progress — this can take many minutes at high depth.</span></div>${cfg}
      <div class="empty">Live-polling every 8s. You can close this and come back;<br>the run continues on the server.</div>`;
  }else{
    if(POLL){clearInterval(POLL);POLL=null;}
    v.innerHTML=`<div class="status-line"><span class="pill ${st}">${st}</span></div>${cfg}
      <div class="empty">${d.error?('⚠ '+d.error):'No report available.'}</div>`;
  }
}

function dl(runId){
  const blob=new Blob([window._md||''],{type:'text/markdown'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=runId+'.md';a.click();
}

loadSchema().then(refreshRuns);
setInterval(refreshRuns,10000);
</script>
</body>
</html>
